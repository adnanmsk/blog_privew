<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Bat Swing Pipeline</title>
    <style>
        body {
            background-color: #0b0f19;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .pipeline-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: #111827;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 245, 212, 0.1);
            padding: 40px;
            border: 1px solid #1f2937;
        }

        .node {
            position: absolute;
            width: 180px;
            height: 70px;
            box-sizing: border-box;
            background: rgba(31, 41, 55, 0.8);
            border: 2px solid #374151;
            padding: 12px 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .node span {
            display: block;
            font-size: 11px;
            color: #9ca3af;
            margin-top: 5px;
            font-weight: normal;
        }

        /* Group Colors */
        .prep { border-color: #f59e0b; box-shadow: 0 0 15px rgba(245, 158, 11, 0.2); }
        .infer { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .phys { border-color: #10b981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .out { border-color: #ec4899; box-shadow: 0 0 20px rgba(236, 72, 153, 0.4); }

        /* Node Positions - PERFECTLY CENTERED (Center Line at 500px) */
        #n1 { top: 50px; left: 410px; }
        #n2 { top: 170px; left: 410px; }
        
        #n3a { top: 290px; left: 210px; }
        #n3b { top: 290px; left: 610px; }
        
        #n4 { top: 410px; left: 410px; }
        #n5 { top: 510px; left: 410px; }
        
        #n6 { top: 510px; left: 680px; }

        /* Animated Pulses */
        .node:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            border-color: #fff;
        }

        /* SVG Lines */
        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .line {
            fill: none;
            stroke: #4b5563;
            stroke-width: 3;
            stroke-dasharray: 10, 10;
        }

        .animated-line {
            stroke: #00f5d4;
            animation: dash 2s linear infinite;
        }

        .animated-line-slow {
            stroke: #fca311;
            animation: dash 3s linear infinite;
        }

        .animated-line-fast {
            stroke: #ec4899;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            from { stroke-dashoffset: 40; }
            to { stroke-dashoffset: 0; }
        }

        /* Data Packets (Glowing Orbs moving along lines) */
        .packet {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            z-index: 5;
            transform: translate(-50%, -50%);
        }

        /* Packet Animations using CSS offset-path (Perfect Alignment!) */
        .p1 {
            offset-path: path('M 500 120 L 500 170');
            animation: move-packet 1s infinite linear;
            box-shadow: 0 0 10px #fff, 0 0 20px #00f5d4;
        }
        .p2a {
            offset-path: path('M 500 240 Q 500 265 300 290');
            animation: move-packet 1.5s infinite linear;
            box-shadow: 0 0 10px #fff, 0 0 20px #f59e0b;
        }
        .p2b {
            offset-path: path('M 500 240 Q 500 265 700 290');
            animation: move-packet 1.5s infinite linear;
            box-shadow: 0 0 10px #fff, 0 0 20px #3b82f6;
        }
        .p3a {
            offset-path: path('M 300 360 Q 300 385 500 410');
            animation: move-packet 1.5s infinite linear;
            box-shadow: 0 0 10px #fff, 0 0 20px #10b981;
        }
        .p3b {
            offset-path: path('M 700 360 Q 700 385 500 410');
            animation: move-packet 1.5s infinite linear;
            box-shadow: 0 0 10px #fff, 0 0 20px #10b981;
        }
        .p4 {
            offset-path: path('M 500 480 L 500 510');
            animation: move-packet 0.8s infinite linear;
            box-shadow: 0 0 10px #fff, 0 0 20px #ec4899;
        }
        .p5 {
            offset-path: path('M 590 545 L 680 545');
            animation: move-packet 1.2s infinite linear;
            background: #ec4899;
            box-shadow: 0 0 10px #fff, 0 0 30px #ec4899;
        }

        @keyframes move-packet {
            0% {
                offset-distance: 0%;
            }
            100% {
                offset-distance: 100%;
            }
        }

        h2 {
            text-align: center;
            color: #e5e7eb;
            margin-top: -10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <div class="pipeline-container">
        <h2>BAT SWING PLANE PIPELINE</h2>

        <!-- Background SVG Lines -->
        <svg>
            <!-- 1 to 2 -->
            <path d="M 500 120 L 500 170" class="line animated-line-slow" />
            <!-- 2 to 3a and 3b -->
            <path d="M 500 240 Q 500 265 300 290" class="line animated-line" />
            <path d="M 500 240 Q 500 265 700 290" class="line animated-line" />
            <!-- 3a and 3b to 4 -->
            <path d="M 300 360 Q 300 385 500 410" class="line animated-line" />
            <path d="M 700 360 Q 700 385 500 410" class="line animated-line" />
            <!-- 4 to 5 -->
            <path d="M 500 480 L 500 510" class="line animated-line" />
            <!-- 5 to 6 -->
            <path d="M 590 545 L 680 545" class="line animated-line-fast" />
        </svg>

        <!-- Glowing Packets -->
        <div class="packet p1"></div>
        <div class="packet p2a"></div>
        <div class="packet p2b"></div>
        <div class="packet p3a"></div>
        <div class="packet p3b"></div>
        <div class="packet p4"></div>
        <div class="packet p5"></div>

        <!-- Nodes -->
        <div class="node prep" id="n1">
            1. Trim Video
            <span>Pose Detection</span>
        </div>

        <div class="node prep" id="n2">
            2. Stabilize Camera
            <span>Crease Line Tracking</span>
        </div>

        <div class="node infer" id="n3a">
            3a. Depth Maps
            <span>Depth Estimation</span>
        </div>

        <div class="node infer" id="n3b">
            3b. Bat Mask
            <span>Object Tracking</span>
        </div>

        <div class="node phys" id="n4">
            4. 3D Keypoints
            <span>PCA for Bat Axis</span>
        </div>

        <div class="node phys" id="n5">
            5. 3D Fusion
            <span>Physics-based Smoothing</span>
        </div>

        <div class="node out" id="n6">
            6. Render Trajectory
            <span>3D Visualization</span>
        </div>

    </div>

</body>
</html>
